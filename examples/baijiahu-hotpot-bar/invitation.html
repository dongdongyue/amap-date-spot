<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>🍻 碰面邀请</title><style>

.footer{text-align:center;font-size:10px;color:#ccc;padding:8px 0}
</style></head><body>
